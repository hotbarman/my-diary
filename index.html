<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#c97c3a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="내 일기장">
<title>내 일기장</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;500&family=Nanum+Gothic&family=Nanum+Myeongjo&family=Black+Han+Sans&family=Gowun+Dodum&family=Sunflower:wght@300&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#faf7f2;--paper:#fffef9;--line:#e8e0d0;--ink:#2c2416;--muted:#8a7a65;
  --accent:#c97c3a;--accent2:#7a9e7e;--shadow:rgba(44,36,22,0.12);--bar:#fffef9;
  --font-hand:'Nanum Pen Script',cursive;
  --font-ui:'Noto Sans KR',sans-serif;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:var(--font-ui);display:flex;flex-direction:column;height:100dvh;}
.screen{display:none;flex-direction:column;height:100%;overflow:hidden;}
.screen.active{display:flex;}

/* ════════════════════════════
   LOCK SCREEN — 반듯하게 개선
════════════════════════════ */
#screen-lock{background:linear-gradient(135deg,#fdf5ec 0%,#f5ede0 100%);align-items:center;justify-content:center;}
.lock-outer{width:100%;max-width:360px;padding:20px;}
.lock-wrap{background:var(--paper);border-radius:20px;box-shadow:0 6px 32px var(--shadow);padding:32px 28px 28px;display:flex;flex-direction:column;align-items:center;gap:16px;}
.lock-icon{font-size:48px;line-height:1;}
.lock-title{font-family:var(--font-hand);font-size:30px;color:var(--accent);}
.lock-sub{font-size:13px;color:var(--muted);text-align:center;line-height:1.6;}
.pin-dots{display:flex;gap:16px;margin:4px 0;}
.pin-dot{width:18px;height:18px;border-radius:50%;border:2.5px solid var(--line);background:transparent;transition:all 0.15s;}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);transform:scale(1.1);}
.lock-error{font-size:13px;color:#c05040;min-height:20px;text-align:center;font-weight:500;}

/* PIN 패드 — 정사각형 버튼 */
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;}
.pin-btn{
  aspect-ratio:1/1;
  border-radius:14px;
  border:1.5px solid var(--line);
  background:var(--paper);
  font-size:24px;font-weight:500;
  cursor:pointer;color:var(--ink);
  font-family:var(--font-ui);
  transition:all 0.12s;
  display:flex;align-items:center;justify-content:center;
  user-select:none;
  -webkit-user-select:none;
  min-height:64px;
}
.pin-btn:hover{background:#f5ede0;border-color:var(--accent);}
.pin-btn:active{background:var(--accent);color:#fff;border-color:var(--accent);transform:scale(0.92);}
.pin-btn.del{font-size:20px;color:var(--muted);}
.pin-btn.del:active{background:#e8d0b8;color:var(--ink);}
.pin-btn.empty{border:none;background:transparent;cursor:default;pointer-events:none;}
.pin-btn.empty:hover,.pin-btn.empty:active{background:transparent;transform:none;}
.lock-links{display:flex;gap:16px;font-size:12px;color:var(--muted);}
.lock-link{cursor:pointer;text-decoration:underline;text-underline-offset:2px;}
.lock-link:hover{color:var(--accent);}

/* setup mode */
#setup-pw-wrap{display:none;flex-direction:column;align-items:center;gap:14px;width:100%;}
#setup-pw-wrap.show{display:flex;}
.setup-label{font-size:13px;color:var(--muted);text-align:center;}
.pw-btn{width:100%;padding:14px;border-radius:14px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:500;cursor:pointer;font-family:var(--font-ui);}
.pw-btn:active{background:#a8662e;}
.pw-btn.secondary{background:var(--bg);color:var(--muted);border:1.5px solid var(--line);margin-top:2px;}

/* ════════════════════════════
   TOPBAR / COMMON
════════════════════════════ */
.topbar{flex-shrink:0;height:52px;background:var(--bar);border-bottom:1.5px solid var(--line);display:flex;align-items:center;padding:0 10px;gap:4px;}
.logo{font-family:var(--font-hand);font-size:24px;color:var(--accent);flex:1;padding-left:4px;}
.date-badge{font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:3px 10px;white-space:nowrap;}
.icon-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:none;background:none;cursor:pointer;border-radius:10px;color:var(--muted);flex-shrink:0;}
.icon-btn:active{background:var(--line);}
.icon-btn svg{width:22px;height:22px;}

/* banners */
#edit-banner{flex-shrink:0;display:none;background:#fff8ee;border-bottom:1.5px solid #f0d090;padding:9px 14px;gap:10px;align-items:center;}
#edit-banner.show{display:flex;}
#edit-banner span{font-size:12px;color:#7a4e10;flex:1;}
.cancel-edit-btn{font-size:12px;padding:5px 14px;border:1px solid #e0b860;border-radius:20px;background:#fff;color:#7a4e10;cursor:pointer;font-family:var(--font-ui);white-space:nowrap;}

/* ════════════════════════════
   FONT SELECTOR
════════════════════════════ */
#font-bar{flex-shrink:0;display:flex;gap:6px;align-items:center;padding:6px 12px;background:var(--bg);border-bottom:1px solid var(--line);overflow-x:auto;}
#font-bar::-webkit-scrollbar{display:none;}
.font-chip{flex-shrink:0;font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--line);background:var(--paper);color:var(--ink);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.font-chip:active,.font-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* mood/tags/toolbar */
.mood-bar{flex-shrink:0;display:flex;gap:6px;align-items:center;padding:7px 14px;background:var(--bar);border-bottom:1px solid var(--line);}
.mood-label{font-size:11px;color:var(--muted);white-space:nowrap;}
.mood-btn{font-size:20px;cursor:pointer;opacity:0.45;background:none;border:none;border-radius:6px;padding:2px 3px;transition:all 0.15s;}
.mood-btn.active{opacity:1;transform:scale(1.25);}
.tag-bar{flex-shrink:0;display:flex;gap:6px;align-items:center;padding:6px 14px;background:var(--bg);flex-wrap:nowrap;overflow-x:auto;}
.tag-bar::-webkit-scrollbar{display:none;}
.tag-chip{flex-shrink:0;font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--line);background:var(--paper);color:var(--muted);cursor:pointer;}
.tag-chip.active{background:var(--accent2);color:#fff;border-color:var(--accent2);}
.toolbar{flex-shrink:0;background:var(--bar);border-bottom:1px solid var(--line);padding:7px 12px;display:flex;gap:5px;align-items:center;overflow-x:auto;}
.toolbar::-webkit-scrollbar{display:none;}
.tool-btn{flex-shrink:0;height:34px;padding:0 10px;border:1px solid var(--line);background:var(--paper);border-radius:7px;font-size:13px;cursor:pointer;color:var(--ink);display:flex;align-items:center;gap:4px;white-space:nowrap;font-family:var(--font-ui);}
.tool-btn:active{background:var(--line);}
.tool-sep{flex-shrink:0;width:1px;height:24px;background:var(--line);margin:0 2px;}
.sticker-panel{flex-shrink:0;display:none;padding:8px 12px;background:var(--bar);border-bottom:1px solid var(--line);gap:6px;flex-wrap:wrap;}
.sticker-panel.open{display:flex;}
.sticker{font-size:24px;cursor:pointer;padding:4px 6px;border-radius:8px;}
.sticker:active{background:var(--line);}

/* editor */
.word-count{flex-shrink:0;font-size:10px;color:var(--muted);text-align:right;padding:3px 18px 1px;}
.editor-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px;}
.editor{min-height:100%;background:var(--paper);margin:12px 14px 0;border-radius:4px;box-shadow:2px 2px 10px var(--shadow);padding:16px 18px 24px 50px;position:relative;outline:none;font-size:21px;line-height:1.9;color:var(--ink);word-break:break-word;
  background-image:repeating-linear-gradient(transparent,transparent calc(1.9em - 1px),var(--line) calc(1.9em - 1px),var(--line) 1.9em);background-origin:content-box;}
.editor::before{content:'';position:absolute;left:36px;top:0;bottom:0;width:1.5px;background:rgba(201,124,58,0.22);}
.editor:empty::after{content:attr(data-placeholder);color:var(--muted);font-size:19px;pointer-events:none;}

/* image blocks */
.diary-img-block{display:block;margin:10px 0;position:relative;user-select:none;}
.diary-img-block img{display:block;border-radius:8px;max-width:100%;box-shadow:1px 2px 8px var(--shadow);}
.diary-img-block .img-tb{position:absolute;top:6px;right:6px;display:none;gap:4px;}
.diary-img-block.sel .img-tb{display:flex;}
.itb{width:30px;height:30px;border-radius:7px;background:rgba(0,0,0,0.6);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;}
.sz-btns,.al-btns{display:flex;gap:4px;margin-top:5px;}
.sz-btn{font-size:11px;padding:2px 8px;border:1px solid var(--line);border-radius:20px;background:var(--paper);cursor:pointer;color:var(--muted);font-family:var(--font-ui);}
.sz-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.diary-img-block.sz-s img{max-width:35%;}.diary-img-block.sz-m img{max-width:65%;}.diary-img-block.sz-l img{max-width:100%;}
.diary-img-block.al-l{text-align:left;}.diary-img-block.al-c{text-align:center;}.diary-img-block.al-r{text-align:right;}

/* resize handle */
.img-resize-wrap{position:relative;display:inline-block;}
.img-resize-handle{position:absolute;bottom:4px;right:4px;width:16px;height:16px;background:var(--accent);border-radius:4px;cursor:se-resize;opacity:0.8;}

/* bottombar */
.bottombar{flex-shrink:0;background:var(--bar);border-top:1.5px solid var(--line);display:flex;align-items:center;justify-content:space-around;padding:8px 8px calc(8px + var(--safe-bottom));gap:4px;}
.bb-btn{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--muted);cursor:pointer;background:none;border:none;padding:6px 8px;border-radius:10px;font-family:var(--font-ui);}
.bb-btn:active{background:var(--line);}
.bb-btn svg{width:22px;height:22px;}
.bb-save{background:var(--accent)!important;color:#fff!important;padding:10px 18px!important;border-radius:22px!important;font-size:13px!important;font-weight:500!important;flex-direction:row!important;gap:6px!important;}
.bb-save:active{background:#a8662e!important;}

/* ════════════════════════════
   VIEW SCREEN
════════════════════════════ */
.view-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px;}
.view-meta{margin:14px 14px 0;background:var(--paper);border-radius:12px 12px 0 0;padding:14px 18px 10px;border-bottom:1px solid var(--line);display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.view-meta-date{font-size:13px;color:var(--muted);}
.view-meta-tag{font-size:11px;padding:2px 9px;border-radius:20px;background:var(--bg);color:var(--muted);border:1px solid var(--line);}
.view-body{margin:0 14px;background:var(--paper);border-radius:0 0 12px 12px;padding:16px 18px 28px 50px;position:relative;font-size:21px;line-height:1.9;color:var(--ink);word-break:break-word;box-shadow:2px 4px 12px var(--shadow);
  background-image:repeating-linear-gradient(transparent,transparent calc(1.9em - 1px),var(--line) calc(1.9em - 1px),var(--line) 1.9em);background-origin:content-box;}
.view-body::before{content:'';position:absolute;left:36px;top:0;bottom:0;width:1.5px;background:rgba(201,124,58,0.22);}
.view-body img{max-width:100%;border-radius:8px;margin:10px 0;display:block;}
.view-body .img-tb,.view-body .sz-btns,.view-body .al-btns{display:none!important;}
.view-badge{font-size:11px;padding:2px 8px;border-radius:10px;background:#e8f4e8;color:#2a6a2a;border:1px solid #b8d8b8;}
.view-bottombar{flex-shrink:0;background:var(--bar);border-top:1.5px solid var(--line);display:flex;padding:8px 8px calc(8px + var(--safe-bottom));gap:8px;}
.vbb-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;cursor:pointer;background:none;border:1px solid var(--line);padding:10px 8px;border-radius:14px;font-family:var(--font-ui);color:var(--muted);}
.vbb-btn:active{background:var(--line);}
.vbb-btn svg{width:20px;height:20px;}
.vbb-btn.edit-vbb{border-color:var(--accent);color:var(--accent);background:#fff8f2;}
.vbb-btn.edit-vbb:active{background:var(--accent);color:#fff;}
.vbb-search-hl{background:rgba(201,124,58,0.28);border-radius:3px;}

/* ════════════════════════════
   LIST SCREEN
════════════════════════════ */
#search-bar{flex-shrink:0;display:none;background:var(--bar);border-bottom:1px solid var(--line);padding:8px 14px;gap:8px;align-items:center;}
#search-bar.show{display:flex;}
#search-input{flex:1;height:36px;border:1.5px solid var(--line);border-radius:20px;padding:0 14px;font-size:14px;font-family:var(--font-ui);outline:none;background:var(--bg);color:var(--ink);}
#search-input:focus{border-color:var(--accent);}
.search-clear{background:none;border:none;font-size:18px;color:var(--muted);cursor:pointer;padding:0 4px;}
#search-result-info{flex-shrink:0;font-size:11px;padding:4px 16px 2px;display:none;gap:12px;align-items:center;}
#search-result-info.show{display:flex;}
.src-local{color:var(--accent);}
.src-drive{color:#0f6e56;}
#gdrive-search-status{font-size:11px;color:var(--muted);}

#select-toolbar{flex-shrink:0;display:none;background:#fff8ee;border-bottom:1.5px solid #f0d090;padding:9px 14px;gap:8px;align-items:center;}
#select-toolbar.show{display:flex;}
#sel-count{font-size:13px;color:#7a4e10;flex:1;font-weight:500;}
.sel-tb-btn{font-size:12px;padding:6px 14px;border-radius:20px;cursor:pointer;font-family:var(--font-ui);border:none;white-space:nowrap;}
.sel-tb-btn.all{background:var(--bg);border:1px solid var(--line);color:var(--muted);}
.sel-tb-btn.pdf{background:var(--accent);color:#fff;font-weight:500;}
.sel-tb-btn.pdf:active{background:#a8662e;}
.sel-tb-btn.cancel{background:none;color:var(--muted);border:1px solid var(--line);}

.list-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:16px;}
.list-section-label{font-size:11px;color:var(--muted);padding:10px 16px 4px;font-weight:500;letter-spacing:0.5px;}
.list-empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:15px;line-height:2.2;}
.entry-card{background:var(--paper);margin:6px 14px 0;border-radius:12px;border:1.5px solid var(--line);overflow:hidden;transition:border-color 0.15s;cursor:pointer;}
.entry-card:active{background:#fdf8f2;}
.entry-card.checked{border-color:var(--accent);background:#fffaf5;}
.entry-card.gdrive-card{border-color:#b8d8b8;background:#f8fdf8;}
.ec-select-row{display:flex;align-items:center;padding:10px 14px 0;gap:10px;}
.ec-checkbox{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
.ec-checkbox.on{background:var(--accent);border-color:var(--accent);}
.ec-checkbox.on::after{content:'✓';color:#fff;font-size:13px;font-weight:bold;}
.ec-top{display:flex;justify-content:space-between;align-items:center;padding:10px 14px 4px;}
.ec-date{font-size:12px;color:var(--muted);}
.ec-edited{font-size:10px;color:var(--accent);margin-left:5px;}
.ec-drive-badge{font-size:10px;color:#0f6e56;background:#e8f5e8;padding:1px 7px;border-radius:10px;margin-left:5px;}
.ec-meta{font-size:16px;}
.ec-preview{padding:2px 14px 8px;font-size:16px;color:var(--ink);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;font-family:var(--font-hand);}
.ec-preview .hl{background:rgba(201,124,58,0.3);border-radius:3px;}
.ec-tags{display:flex;gap:4px;flex-wrap:wrap;padding:0 14px 8px;}
.ec-tag{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--bg);color:var(--muted);border:1px solid var(--line);}
.ec-tag.hl{background:rgba(201,124,58,0.2);border-color:var(--accent);color:var(--accent);}

#list-bottombar{flex-shrink:0;background:var(--bar);border-top:1.5px solid var(--line);display:flex;align-items:center;justify-content:space-around;padding:8px 8px calc(8px + var(--safe-bottom));}
.lbb-btn{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--muted);cursor:pointer;background:none;border:none;padding:6px 10px;border-radius:10px;font-family:var(--font-ui);}
.lbb-btn:active{background:var(--line);}
.lbb-btn svg{width:22px;height:22px;}
.lbb-btn.accent-btn{color:var(--accent);}
.lbb-btn.active-mode{background:var(--accent);color:#fff;border-radius:20px;}

#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(44,36,22,0.9);color:#fff;font-size:13px;padding:10px 22px;border-radius:22px;opacity:0;transition:all 0.25s;pointer-events:none;z-index:9999;white-space:nowrap;font-family:var(--font-ui);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ════════════════════════════
   PDF PRINT — 개선됨
════════════════════════════ */
@media print{
  @page{margin:20mm 18mm;}
  body>*{display:none!important;}
  #print-area{display:block!important;position:static!important;}
  .print-cover{page-break-after:always;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;font-family:'Nanum Pen Script',serif;text-align:center;}
  .print-cover h1{font-size:52px;color:#c97c3a;margin-bottom:16px;}
  .print-cover p{font-size:18px;color:#8a7a65;margin:4px 0;}
  .print-entry{page-break-before:always;padding:0;font-family:'Nanum Pen Script',serif;}
  .print-entry:first-of-type{page-break-before:always;}
  .print-meta{font-family:'Noto Sans KR',sans-serif;font-size:12px;color:#8a7a65;border-bottom:1.5px solid #e8e0d0;padding-bottom:10px;margin-bottom:20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .print-tag{background:#f0ebe0;padding:2px 8px;border-radius:12px;font-size:11px;}
  .print-body{font-size:19px;line-height:2;color:#2c2416;word-break:break-word;}
  .print-body img{max-width:100%;border-radius:6px;margin:10px 0;display:block;}
  .print-body .diary-img-block.sz-s img{max-width:38%;}
  .print-body .diary-img-block.sz-m img{max-width:65%;}
  .print-body .diary-img-block.sz-l img{max-width:100%;}
  .print-body .diary-img-block.al-c{text-align:center;}
  .print-body .diary-img-block.al-r{text-align:right;}
  .print-body .img-tb,.print-body .sz-btns,.print-body .al-btns,.print-body .img-resize-handle{display:none!important;}
  .print-drive-badge{font-size:11px;color:#0f6e56;background:#e8f5e8;padding:1px 7px;border-radius:8px;}
}
#print-area{display:none;}
</style>
</head>
<body>

<!-- ══ LOCK SCREEN ══ -->
<div class="screen active" id="screen-lock">
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto;">
    <div class="lock-outer">
      <div class="lock-wrap">
        <div class="lock-icon">🔒</div>
        <div class="lock-title">내 일기장</div>
        <div class="lock-sub" id="lock-sub">비밀번호 4자리를 입력하세요</div>

        <div id="pin-mode" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:14px;">
          <div class="pin-dots" id="pin-dots">
            <div class="pin-dot" id="d0"></div>
            <div class="pin-dot" id="d1"></div>
            <div class="pin-dot" id="d2"></div>
            <div class="pin-dot" id="d3"></div>
          </div>
          <div class="lock-error" id="lock-error"></div>
          <div class="pin-pad">
            <button class="pin-btn" onclick="pinInput('1')">1</button>
            <button class="pin-btn" onclick="pinInput('2')">2</button>
            <button class="pin-btn" onclick="pinInput('3')">3</button>
            <button class="pin-btn" onclick="pinInput('4')">4</button>
            <button class="pin-btn" onclick="pinInput('5')">5</button>
            <button class="pin-btn" onclick="pinInput('6')">6</button>
            <button class="pin-btn" onclick="pinInput('7')">7</button>
            <button class="pin-btn" onclick="pinInput('8')">8</button>
            <button class="pin-btn" onclick="pinInput('9')">9</button>
            <button class="pin-btn empty" disabled></button>

<script>
// ── STATE ──
const weathers=['☀️','⛅','🌧️','❄️','🌫️','🌩️'];
let wIdx=0,mood='',insertAfter=null,entries=[],editingId=null;
let selectMode=false,selectedIds=new Set();
let searchActive=false,searchKw='';
let viewingId=null,viewingFromDrive=false;
let pinBuf='',setupBuf='',setupStep=0,setupFirst='';
let currentFont="'Nanum Pen Script',cursive";
let driveResults=[];

function p2(n){return String(n).padStart(2,'0');}

// ── INIT ──
try{const s=localStorage.getItem('diary_entries');if(s)entries=JSON.parse(s);}catch(e){}
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
(()=>{
  const d=new Date(),dy=['일','월','화','수','목','금','토'];
  document.getElementById('today-date').textContent=
    `${d.getFullYear()}.${p2(d.getMonth()+1)}.${p2(d.getDate())} (${dy[d.getDay()]})`;
})();
function initLock(){
  if(!hasPw()){showScreen('screen-write');return;}
  showScreen('screen-lock');
  document.getElementById('pin-mode').style.display='flex';
  document.getElementById('setup-pw-wrap').classList.remove('show');
}
initLock();

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── LOCK ──
function hasPw(){return!!localStorage.getItem('diary_pw');}
function checkPw(pin){return localStorage.getItem('diary_pw')===pin;}
function pinInput(d){
  if(pinBuf.length>=4)return;
  pinBuf+=d;updatePinDots(pinBuf,'d');
  if(pinBuf.length===4){
    setTimeout(()=>{
      if(checkPw(pinBuf)){pinBuf='';updatePinDots('','d');showScreen('screen-write');}
      else{
        document.getElementById('lock-error').textContent='비밀번호가 틀렸어요 ❌';
        setTimeout(()=>{pinBuf='';updatePinDots('','d');document.getElementById('lock-error').textContent='';},800);
      }
    },120);
  }
}
function pinDel(){pinBuf=pinBuf.slice(0,-1);updatePinDots(pinBuf,'d');}
function updatePinDots(buf,prefix){for(let i=0;i<4;i++){const el=document.getElementById(prefix+i);if(el)el.classList.toggle('filled',i<buf.length);}}
function showChangePw(){
  if(hasPw()){const old=prompt('현재 비밀번호를 입력하세요');if(old===null)return;if(!checkPw(old)){toast('비밀번호가 틀렸어요');return;}}
  document.getElementById('pin-mode').style.display='none';
  document.getElementById('setup-pw-wrap').classList.add('show');
  setupStep=0;setupBuf='';setupFirst='';
  document.getElementById('setup-step-label').textContent='새 비밀번호 4자리 입력';
  document.getElementById('setup-error').textContent='';
  updatePinDots('','s');
}
function setupInput(d){
  if(setupBuf.length>=4)return;setupBuf+=d;updatePinDots(setupBuf,'s');
  if(setupBuf.length===4){
    setTimeout(()=>{
      if(setupStep===0){setupFirst=setupBuf;setupBuf='';setupStep=1;document.getElementById('setup-step-label').textContent='한 번 더 입력하세요';updatePinDots('','s');}
      else{
        if(setupBuf===setupFirst){localStorage.setItem('diary_pw',setupBuf);toast('비밀번호 설정됐어요 🔐');cancelSetup();showScreen('screen-write');}
        else{document.getElementById('setup-error').textContent='비밀번호가 일치하지 않아요';setupBuf='';setupStep=0;setupFirst='';document.getElementById('setup-step-label').textContent='새 비밀번호 4자리 입력';setTimeout(()=>{updatePinDots('','s');document.getElementById('setup-error').textContent='';},700);}
      }
    },120);
  }
}
function setupDel(){setupBuf=setupBuf.slice(0,-1);updatePinDots(setupBuf,'s');}
function cancelSetup(){document.getElementById('setup-pw-wrap').classList.remove('show');document.getElementById('pin-mode').style.display='flex';setupBuf='';setupStep=0;setupFirst='';}
function skipLock(){if(hasPw()){if(!confirm('비밀번호를 제거하고 잠금을 해제할까요?'))return;localStorage.removeItem('diary_pw');}showScreen('screen-write');}
function lockApp(){showScreen('screen-lock');pinBuf='';updatePinDots('','d');document.getElementById('lock-error').textContent='';}

// ── FONT ──
function setFont(chip){
  document.querySelectorAll('.font-chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active');
  currentFont=chip.dataset.font;
  document.getElementById('editor').style.fontFamily=currentFont;
}

// ── WRITE ──
function cycleWeather(){wIdx=(wIdx+1)%weathers.length;document.getElementById('weather-btn').textContent=weathers[wIdx];}
function setMood(btn){document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');mood=btn.dataset.mood;}
function toggleTag(c){c.classList.toggle('active');}
function execCmd(cmd){document.getElementById('editor').focus();document.execCommand(cmd,false,null);}
function execHL(){document.getElementById('editor').focus();document.execCommand('hiliteColor',false,'rgba(201,124,58,0.22)');}
function onInput(){const t=document.getElementById('editor').innerText.replace(/\n/g,'').trim();document.getElementById('wc').textContent=t.length+' 글자';}
function onKD(e){if(e.key==='Enter'){document.execCommand('insertParagraph',false);e.preventDefault();}}
function toggleSt(){document.getElementById('sticker-panel').classList.toggle('open');}
function ins(e){document.getElementById('editor').focus();document.execCommand('insertText',false,e);}

// ── PASTE IMAGE (클립보드 붙여넣기) ──
function onPaste(e){
  const items=e.clipboardData&&e.clipboardData.items;
  if(!items)return;
  for(let i=0;i<items.length;i++){
    if(items[i].type.startsWith('image/')){
      e.preventDefault();
      const blob=items[i].getAsFile();
      const reader=new FileReader();
      reader.onload=ev=>insertImg(ev.target.result);
      reader.readAsDataURL(blob);
      return;
    }
  }
}

function insertPhoto(){
  const ed=document.getElementById('editor'),sel=window.getSelection();
  if(sel&&sel.rangeCount>0){const range=sel.getRangeAt(0);let n=range.startContainer;
    while(n&&n!==ed){if(n.parentNode===ed){insertAfter=n;break;}n=n.parentNode;}}
  document.getElementById('file-input').click();
}
function handleFiles(e){Array.from(e.target.files).forEach(f=>{const r=new FileReader();r.onload=ev=>insertImg(ev.target.result);r.readAsDataURL(f);});e.target.value='';}

function insertImg(src){
  const ed=document.getElementById('editor');
  const block=document.createElement('div');block.className='diary-img-block sz-m al-l';block.contentEditable='false';

  // 이미지 + 리사이즈 래퍼
  const wrap=document.createElement('div');wrap.className='img-resize-wrap';
  wrap.style.cssText='display:inline-block;position:relative;max-width:100%;';

  const img=document.createElement('img');img.src=src;img.alt='';
  img.style.cssText='display:block;border-radius:8px;width:100%;';
  img.onclick=()=>selBlock(block);

  // 리사이즈 핸들
  const handle=document.createElement('div');handle.className='img-resize-handle';
  handle.title='드래그해서 크기 조절';
  addResizeHandlers(handle,wrap,img);

  wrap.appendChild(img);wrap.appendChild(handle);

  const tb=document.createElement('div');tb.className='img-tb';
  const del=document.createElement('button');del.className='itb';
  del.innerHTML='<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="2.2"><path d="M3 3l10 10M13 3L3 13"/></svg>';
  del.onclick=ev=>{ev.stopPropagation();block.remove();onInput();};tb.appendChild(del);

  const szD=document.createElement('div');szD.className='sz-btns';
  [['sz-s','작게'],['sz-m','중간'],['sz-l','크게']].forEach(([cls,lbl])=>{
    const b=document.createElement('button');b.className='sz-btn'+(cls==='sz-m'?' active':'');b.textContent=lbl;
    b.onclick=ev=>{ev.stopPropagation();block.classList.remove('sz-s','sz-m','sz-l');block.classList.add(cls);wrap.style.width='';szD.querySelectorAll('.sz-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');};szD.appendChild(b);});
  const alD=document.createElement('div');alD.className='al-btns';
  [['al-l','◀'],['al-c','■'],['al-r','▶']].forEach(([cls,lbl])=>{
    const b=document.createElement('button');b.className='sz-btn'+(cls==='al-l'?' active':'');b.textContent=lbl;
    b.onclick=ev=>{ev.stopPropagation();block.classList.remove('al-l','al-c','al-r');block.classList.add(cls);alD.querySelectorAll('.sz-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');};alD.appendChild(b);});

  block.appendChild(wrap);block.appendChild(tb);block.appendChild(szD);block.appendChild(alD);
  if(insertAfter&&insertAfter.parentNode===ed)ed.insertBefore(block,insertAfter.nextSibling);else ed.appendChild(block);
  const p=document.createElement('p');p.innerHTML='<br>';block.after(p);
  const range=document.createRange();range.setStart(p,0);range.collapse(true);
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
  toast('사진 삽입됐어요 📷 (핸들로 크기조절)');insertAfter=null;
}

// 드래그 리사이즈
function addResizeHandlers(handle,wrap,img){
  let startX,startW;
  function onMove(e){
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const newW=Math.max(80,startW+(clientX-startX));
    wrap.style.width=newW+'px';
  }
  function onUp(){
    document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);
    document.removeEventListener('touchmove',onMove);document.removeEventListener('touchend',onUp);
  }
  handle.addEventListener('mousedown',e=>{
    e.preventDefault();e.stopPropagation();
    startX=e.clientX;startW=wrap.offsetWidth||img.offsetWidth||200;
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
  });
  handle.addEventListener('touchstart',e=>{
    e.preventDefault();e.stopPropagation();
    startX=e.touches[0].clientX;startW=wrap.offsetWidth||img.offsetWidth||200;
    document.addEventListener('touchmove',onMove,{passive:false});document.addEventListener('touchend',onUp);
  },{passive:false});
}

function selBlock(b){document.querySelectorAll('.diary-img-block').forEach(x=>x.classList.remove('sel'));b.classList.toggle('sel');}

function buildHTML(dateStr,html,m,w,tags,fontFamily){
  const ff=fontFamily||currentFont;
  return`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>일기 ${dateStr}</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Nanum+Gothic&family=Nanum+Myeongjo&family=Gowun+Dodum&family=Sunflower:wght@300&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>body{font-family:${ff};font-size:22px;line-height:2;padding:28px 20px;max-width:640px;margin:auto;color:#2c2416;background:#fffef9;}
.meta{font-family:'Noto Sans KR',sans-serif;font-size:13px;color:#8a7a65;margin-bottom:24px;padding-bottom:12px;border-bottom:2px solid #e8e0d0;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.tag{background:#f0ebe0;padding:2px 9px;border-radius:20px;font-size:11px;}
img{border-radius:10px;margin:12px 0;display:block;}
.img-resize-wrap{display:inline-block;max-width:100%;}
.img-resize-wrap img{width:100%;}
.diary-img-block{margin:12px 0;}
.diary-img-block.sz-s .img-resize-wrap{max-width:38%;}.diary-img-block.sz-m .img-resize-wrap{max-width:68%;}.diary-img-block.sz-l .img-resize-wrap{max-width:100%;}
.diary-img-block.al-c{text-align:center;}.diary-img-block.al-r{text-align:right;}
.img-tb,.sz-btns,.al-btns,.img-resize-handle{display:none!important;}</style></head><body>
<div class="meta"><span>📅 ${dateStr}</span><span>${m}</span><span>${w}</span>${tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
${html}</body></html>`;
}

function saveEntry(){
  const ed=document.getElementById('editor');
  const html=ed.innerHTML.trim(),text=ed.innerText.trim();
  if(!text&&!html.includes('<img')){toast('내용을 먼저 입력해 주세요 ✏️');return;}
  const d=new Date();
  const tags=Array.from(document.querySelectorAll('.tag-chip.active')).map(t=>t.textContent);
  if(editingId!==null){
    const idx=entries.findIndex(e=>e.id===editingId);
    if(idx>-1){
      const old=entries[idx];const m=mood||old.mood,w=weathers[wIdx],t=tags.length?tags:old.tags;
      const full=buildHTML(old.date,html,m,w,t,old.font||currentFont);
      entries[idx]={...old,mood:m,weather:w,tags:t,preview:text.slice(0,60),html:full,
        editedAt:`${p2(d.getHours())}:${p2(d.getMinutes())}`,font:currentFont};
      saveLS();dlBlob(full,old.fn);toast('✅ 수정 저장 완료!');
    }
    cancelEdit();
  } else {
    const ds=`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
    const fn=`일기_${ds}_${p2(d.getHours())}${p2(d.getMinutes())}.html`;
    const full=buildHTML(ds,html,mood||'—',weathers[wIdx],tags,currentFont);
    entries.unshift({id:Date.now(),date:ds,time:`${d.getHours()}:${p2(d.getMinutes())}`,mood:mood||'—',weather:weathers[wIdx],tags,preview:text.slice(0,60),fn,html:full,font:currentFont});
    saveLS();dlBlob(full,fn);toast(`💾 ${fn} 저장 완료!`);
  }
}
function dlBlob(html,fn){
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
function saveLS(){try{localStorage.setItem('diary_entries',JSON.stringify(entries.slice(0,200)));}catch(e){}}

function cancelEdit(){
  editingId=null;document.getElementById('edit-banner').classList.remove('show');
  document.getElementById('write-logo').textContent='✍ 내 일기';
  document.getElementById('editor').innerHTML='';
  document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tag-chip').forEach(t=>t.classList.remove('active'));
  mood='';wIdx=0;document.getElementById('weather-btn').textContent=weathers[0];
  document.getElementById('wc').textContent='0 글자';
}
function loadEntryToEdit(id){
  const e=entries.find(x=>x.id===id);if(!e)return;
  const parser=new DOMParser();const doc=parser.parseFromString(e.html,'text/html');
  const metaEl=doc.querySelector('.meta');if(metaEl)metaEl.remove();
  document.getElementById('editor').innerHTML=doc.body.innerHTML.trim();
  onInput();
  mood=e.mood;document.querySelectorAll('.mood-btn').forEach(b=>b.classList.toggle('active',b.dataset.mood===e.mood));
  const wi=weathers.indexOf(e.weather);if(wi>-1){wIdx=wi;document.getElementById('weather-btn').textContent=weathers[wIdx];}
  document.querySelectorAll('.tag-chip').forEach(chip=>chip.classList.toggle('active',e.tags.includes(chip.textContent)));
  // restore font
  if(e.font){currentFont=e.font;document.getElementById('editor').style.fontFamily=currentFont;
    document.querySelectorAll('.font-chip').forEach(c=>c.classList.toggle('active',c.dataset.font===e.font));}
  editingId=e.id;document.getElementById('edit-banner').classList.add('show');
  document.getElementById('write-logo').textContent='✏️ 수정 중';
}

// ── VIEW ──
function openView(id,fromDrive){
  const src=fromDrive?driveResults:entries;
  const e=src.find(x=>x.id===id);if(!e)return;
  viewingId=id;viewingFromDrive=!!fromDrive;
  document.getElementById('view-title').textContent=`📖 ${e.date}`;
  document.getElementById('view-edit-btn').style.display=fromDrive?'none':'flex';
  const kw=searchKw.toLowerCase();
  const tagHtml=e.tags.map(t=>`<span class="view-meta-tag">${t}</span>`).join('');
  const driveBadge=fromDrive?`<span class="view-badge">☁️ 드라이브</span>`:'';
  document.getElementById('view-meta').innerHTML=
    `<span class="view-meta-date">📅 ${e.date} ${e.time||''}${e.editedAt?` · 수정 ${e.editedAt}`:''}</span>
     <span style="font-size:18px;">${e.mood||''} ${e.weather||''}</span>${tagHtml}${driveBadge}`;
  const parser=new DOMParser();const doc=parser.parseFromString(e.html,'text/html');
  const metaEl=doc.querySelector('.meta');if(metaEl)metaEl.remove();
  let bodyHtml=doc.body.innerHTML.trim();
  if(kw){const tmp=document.createElement('div');tmp.innerHTML=bodyHtml;highlightText(tmp,kw);bodyHtml=tmp.innerHTML;}
  const vb=document.getElementById('view-body');
  vb.innerHTML=bodyHtml;
  vb.style.fontFamily=e.font||"'Nanum Pen Script',cursive";
  showScreen('screen-view');
}
function highlightText(node,kw){
  if(node.nodeType===3){
    const idx=node.textContent.toLowerCase().indexOf(kw);
    if(idx>-1){const span=document.createElement('span');span.innerHTML=node.textContent.slice(0,idx)+`<mark class="vbb-search-hl">${node.textContent.slice(idx,idx+kw.length)}</mark>`+node.textContent.slice(idx+kw.length);node.parentNode.replaceChild(span,node);}
  } else if(node.nodeType===1&&!['SCRIPT','STYLE','IMG'].includes(node.tagName)){Array.from(node.childNodes).forEach(c=>highlightText(c,kw));}
}
function viewEdit(){if(viewingFromDrive){toast('드라이브 일기는 수정할 수 없어요');return;}loadEntryToEdit(viewingId);showScreen('screen-write');toast('불러왔어요! 수정 후 저장하세요 ✏️');}
function viewDownload(){
  const src=viewingFromDrive?driveResults:entries;
  const e=src.find(x=>x.id===viewingId);if(!e)return;
  dlBlob(e.html,e.fn||`일기_${e.date}.html`);toast('다운로드했어요 📥');
}
function viewPrint(){if(viewingId)printEntries([viewingId],viewingFromDrive?driveResults:null);}

// ── GOOGLE DRIVE SEARCH ──
async function searchGoogleDrive(kw){
  document.getElementById('gdrive-search-status').textContent='☁️ 드라이브 검색 중...';
  driveResults=[];
  try{
    const response=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:2000,
        system:`You are a Google Drive search assistant. Search for diary HTML files containing the keyword. 
Return ONLY a JSON array like: [{"id":1234,"date":"2026-04-24","time":"14:30","mood":"😊","weather":"☀️","tags":["#일상"],"preview":"미리보기 텍스트","fn":"일기_2026-04-24_1430.html","html":"<full html content>","font":"'Nanum Pen Script',cursive"}]
If nothing found return []. No other text.`,
        messages:[{role:"user",content:`Search Google Drive for diary files (HTML files starting with "일기_") containing the keyword: "${kw}". Return matching entries as JSON.`}],
        mcp_servers:[{type:"url",url:"https://drivemcp.googleapis.com/mcp/v1",name:"google-drive"}]
      })
    });
    const data=await response.json();
    const text=data.content?.filter(c=>c.type==='text').map(c=>c.text).join('')||'';
    try{
      const clean=text.replace(/```json|```/g,'').trim();
      const arr=JSON.parse(clean);
      if(Array.isArray(arr)){
        driveResults=arr.map((e,i)=>({...e,id:e.id||Date.now()+i,fromDrive:true}));
      }
    }catch(pe){driveResults=[];}
    const n=driveResults.length;
    document.getElementById('gdrive-search-status').textContent='';
    document.getElementById('info-drive').textContent=n?`☁️ 드라이브 ${n}개`:'☁️ 드라이브 없음';
  }catch(err){
    document.getElementById('gdrive-search-status').textContent='';
    document.getElementById('info-drive').textContent='☁️ 드라이브 연결 안됨';
  }
  renderList();
}

// ── SEARCH ──
function toggleSearch(){
  searchActive=!searchActive;
  const bar=document.getElementById('search-bar');
  if(searchActive){bar.classList.add('show');document.getElementById('search-input').focus();}
  else{bar.classList.remove('show');clearSearch();}
}
let searchTimer=null;
function doSearch(){
  searchKw=document.getElementById('search-input').value.trim();
  if(searchKw){
    const local=getFilteredEntries();
    document.getElementById('info-local').textContent=`📱 로컬 ${local.length}개`;
    document.getElementById('info-drive').textContent='☁️ 검색 중...';
    document.getElementById('search-result-info').classList.add('show');
    clearTimeout(searchTimer);
    searchTimer=setTimeout(()=>searchGoogleDrive(searchKw),600);
  } else {
    document.getElementById('search-result-info').classList.remove('show');
    driveResults=[];
  }
  renderList();
}
function clearSearch(){
  document.getElementById('search-input').value='';searchKw='';driveResults=[];
  document.getElementById('search-result-info').classList.remove('show');
  renderList();
}
function getFilteredEntries(){
  if(!searchKw)return entries;
  const kw=searchKw.toLowerCase();
  return entries.filter(e=>{
    const inTags=e.tags.some(t=>t.toLowerCase().includes(kw));
    const inPreview=e.preview.toLowerCase().includes(kw);
    const parser=new DOMParser();const doc=parser.parseFromString(e.html,'text/html');
    const fullText=(doc.body.innerText||doc.body.textContent||'').toLowerCase();
    return inTags||inPreview||fullText.includes(kw);
  });
}

// ── SELECT MODE ──
function toggleSelectMode(){
  selectMode=!selectMode;selectedIds.clear();
  const btn=document.getElementById('select-mode-btn');const tb=document.getElementById('select-toolbar');
  if(selectMode){btn.classList.add('active-mode');tb.classList.add('show');}
  else{btn.classList.remove('active-mode');tb.classList.remove('show');}
  renderList();
}
function exitSelectMode(){
  selectMode=false;selectedIds.clear();
  document.getElementById('select-mode-btn').classList.remove('active-mode');
  document.getElementById('select-toolbar').classList.remove('show');renderList();
}
function toggleCheck(id,ev){
  ev.stopPropagation();
  if(selectedIds.has(id))selectedIds.delete(id);else selectedIds.add(id);
  updateSelCount();
  const card=document.querySelector(`.entry-card[data-id="${id}"]`);
  if(card){card.classList.toggle('checked',selectedIds.has(id));const cb=card.querySelector('.ec-checkbox');if(cb)cb.classList.toggle('on',selectedIds.has(id));}
}
function toggleSelectAll(){
  const filtered=getFilteredEntries();const allSel=filtered.every(e=>selectedIds.has(e.id));
  if(allSel)filtered.forEach(e=>selectedIds.delete(e.id));else filtered.forEach(e=>selectedIds.add(e.id));
  updateSelCount();renderList();
}
function updateSelCount(){document.getElementById('sel-count').textContent=`${selectedIds.size}개 선택됨`;}

// ── PDF PRINT (개선됨) ──
function printSelected(){
  if(selectedIds.size===0){toast('인쇄할 일기를 선택해 주세요 📋');return;}
  printEntries([...selectedIds],null);
}
function printEntries(ids,srcOverride){
  const src=srcOverride||entries;
  const selected=src.filter(e=>ids.includes(e.id)).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  if(!selected.length){toast('인쇄할 항목이 없어요');return;}
  const area=document.getElementById('print-area');area.innerHTML='';

  // 표지
  const d=new Date();
  const cover=document.createElement('div');cover.className='print-cover';
  cover.innerHTML=`<h1>✍ 내 일기장</h1><p>${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 인쇄</p><p style="margin-top:6px;font-size:15px;color:#8a7a65;">총 ${selected.length}편</p>`;
  area.appendChild(cover);

  // 각 일기 — page-break-before:always 로 페이지 분리
  selected.forEach(e=>{
    const parser=new DOMParser();const doc=parser.parseFromString(e.html,'text/html');
    const m=doc.querySelector('.meta');if(m)m.remove();
    const driveBadge=e.fromDrive?`<span class="print-drive-badge">☁️ 구글 드라이브</span> `:'';
    const entry=document.createElement('div');entry.className='print-entry';
    entry.style.fontFamily=e.font||"'Nanum Pen Script',serif";
    entry.innerHTML=`
      <div class="print-meta">
        <span>📅 ${e.date}${e.time?' '+e.time:''}</span>
        <span>${e.mood||''} ${e.weather||''}</span>
        ${e.tags.map(t=>`<span class="print-tag">${t}</span>`).join('')}
        ${driveBadge}
        ${e.editedAt?`<span style="color:#c97c3a">수정됨</span>`:''}
      </div>
      <div class="print-body">${doc.body.innerHTML.trim()}</div>`;
    area.appendChild(entry);
  });

  area.style.display='block';
  setTimeout(()=>{
    window.print();
    setTimeout(()=>{area.style.display='none';area.innerHTML='';},1500);
  },400);
  toast(`🖨 ${selected.length}개 일기 인쇄 준비 중...`);
}

// ── NAV ──
function goList(){renderList();showScreen('screen-list');}
function goWrite(){showScreen('screen-write');}
function newDiary(){if(document.getElementById('editor').innerText.trim()&&!confirm('새 일기를 시작할까요?'))return;cancelEdit();}

// ── RENDER LIST ──
function renderList(){
  const filtered=getFilteredEntries();
  document.getElementById('entry-count').textContent=entries.length+'개';
  const wrap=document.getElementById('list-wrap');
  wrap.querySelectorAll('.entry-card,.list-section-label').forEach(c=>c.remove());
  const kw=searchKw.toLowerCase();
  const hasLocal=filtered.length>0;
  const hasDrive=driveResults.length>0;
  const isEmpty=!hasLocal&&!hasDrive;
  document.getElementById('list-empty').style.display=isEmpty?'block':'none';
  if(isEmpty)document.getElementById('list-empty').textContent=searchKw?`"${searchKw}" 검색 결과가 없어요 🔍`:'아직 저장된 일기가 없어요\n✏️ 첫 일기를 써보세요!';

  // 로컬 일기
  if(hasLocal){
    if(hasDrive||searchKw){const lbl=document.createElement('div');lbl.className='list-section-label';lbl.textContent='📱 이 기기 일기';wrap.appendChild(lbl);}
    filtered.forEach(e=>wrap.appendChild(makeCard(e,false,kw)));
  }
  // 드라이브 일기
  if(hasDrive){
    const lbl=document.createElement('div');lbl.className='list-section-label';lbl.style.color='#0f6e56';lbl.textContent='☁️ 구글 드라이브 일기 (열람만 가능)';wrap.appendChild(lbl);
    driveResults.forEach(e=>wrap.appendChild(makeCard(e,true,kw)));
  }
}

function makeCard(e,fromDrive,kw){
  const card=document.createElement('div');
  card.className='entry-card'+(selectedIds.has(e.id)?' checked':'')+(fromDrive?' gdrive-card':'');
  card.dataset.id=e.id;

  let previewHtml=e.preview||'(사진만 있음)';
  if(kw&&previewHtml.toLowerCase().includes(kw)){const i=previewHtml.toLowerCase().indexOf(kw);previewHtml=previewHtml.slice(0,i)+`<span class="hl">${previewHtml.slice(i,i+kw.length)}</span>`+previewHtml.slice(i+kw.length);}

  const checkboxHtml=selectMode&&!fromDrive
    ?`<div class="ec-select-row"><div class="ec-checkbox${selectedIds.has(e.id)?' on':''}" onclick="toggleCheck(${e.id},event)"></div></div>`:'';
  const driveBadge=fromDrive?`<span class="ec-drive-badge">☁️ 드라이브</span>`:'';
  const tagHtml=e.tags.map(t=>{const hl=kw&&t.toLowerCase().includes(kw);return`<span class="ec-tag${hl?' hl':''}">${t}</span>`;}).join('');

  card.innerHTML=`${checkboxHtml}
    <div class="ec-top">
      <span class="ec-date">${e.date} ${e.time||''}${e.editedAt?`<span class="ec-edited">수정 ${e.editedAt}</span>`:''} ${driveBadge}</span>
      <span class="ec-meta">${e.mood||''} ${e.weather||''}</span>
    </div>
    <div class="ec-preview" style="font-family:${e.font||"'Nanum Pen Script',cursive"}">${previewHtml}...</div>
    ${e.tags.length?`<div class="ec-tags">${tagHtml}</div>`:''}`;

  card.addEventListener('click',ev=>{
    if(selectMode&&!fromDrive){toggleCheck(e.id,ev);return;}
    if(ev.target.closest('.ec-checkbox'))return;
    openView(e.id,fromDrive);
  });
  return card;
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800);}
document.addEventListener('click',e=>{if(!e.target.closest('.diary-img-block'))document.querySelectorAll('.diary-img-block').forEach(b=>b.classList.remove('sel'));});
</script>
