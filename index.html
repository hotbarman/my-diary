<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#c97c3a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="내 일기장">
<title>내 일기장</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#faf7f2;--paper:#fffef9;--line:#e8e0d0;--ink:#2c2416;--muted:#8a7a65;
  --accent:#c97c3a;--accent2:#7a9e7e;--shadow:rgba(44,36,22,0.12);
  --bar:#fffef9;
  --font-hand:'Nanum Pen Script',serif;
  --font-ui:'Noto Sans KR',sans-serif;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:var(--font-ui);display:flex;flex-direction:column;height:100dvh;}
.screen{display:none;flex-direction:column;height:100%;overflow:hidden;}
.screen.active{display:flex;}

.topbar{flex-shrink:0;height:52px;background:var(--bar);border-bottom:1.5px solid var(--line);display:flex;align-items:center;padding:0 14px;gap:8px;}
.logo{font-family:var(--font-hand);font-size:24px;color:var(--accent);flex:1;}
.date-badge{font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:3px 10px;}
.icon-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:none;background:none;cursor:pointer;border-radius:10px;color:var(--muted);font-size:20px;}
.icon-btn:active{background:var(--line);}

#install-banner{display:none;flex-shrink:0;background:#e8f4e8;border-bottom:1px solid #b8d8b8;padding:10px 14px;gap:10px;align-items:center;}
#install-banner.show{display:flex;}
#install-banner p{font-size:12px;color:#2a5a2a;flex:1;line-height:1.5;}
.inst-btn{font-size:12px;padding:6px 14px;background:var(--accent2);color:#fff;border:none;border-radius:20px;cursor:pointer;white-space:nowrap;font-family:var(--font-ui);}
.close-banner{background:none;border:none;font-size:18px;color:#2a5a2a;cursor:pointer;padding:0 4px;}

#edit-banner{flex-shrink:0;display:none;background:#fff8ee;border-bottom:1.5px solid #f0d090;padding:9px 14px;gap:10px;align-items:center;}
#edit-banner.show{display:flex;}
#edit-banner span{font-size:12px;color:#7a4e10;flex:1;line-height:1.5;}
.cancel-edit-btn{font-size:12px;padding:5px 14px;border:1px solid #e0b860;border-radius:20px;background:#fff;color:#7a4e10;cursor:pointer;font-family:var(--font-ui);white-space:nowrap;}

.mood-bar{flex-shrink:0;display:flex;gap:6px;align-items:center;padding:7px 14px;background:var(--bar);border-bottom:1px solid var(--line);}
.mood-label{font-size:11px;color:var(--muted);white-space:nowrap;}
.mood-btn{font-size:20px;cursor:pointer;opacity:0.45;background:none;border:none;border-radius:6px;padding:2px 3px;transition:all 0.15s;}
.mood-btn.active{opacity:1;transform:scale(1.25);}

.tag-bar{flex-shrink:0;display:flex;gap:6px;align-items:center;padding:6px 14px;background:var(--bg);flex-wrap:nowrap;overflow-x:auto;}
.tag-bar::-webkit-scrollbar{display:none;}
.tag-chip{flex-shrink:0;font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--line);background:var(--paper);color:var(--muted);cursor:pointer;}
.tag-chip.active{background:var(--accent2);color:#fff;border-color:var(--accent2);}

.toolbar{flex-shrink:0;background:var(--bar);border-bottom:1px solid var(--line);padding:7px 12px;display:flex;gap:5px;align-items:center;overflow-x:auto;}
.toolbar::-webkit-scrollbar{display:none;}
.tool-btn{flex-shrink:0;height:34px;padding:0 10px;border:1px solid var(--line);background:var(--paper);border-radius:7px;font-size:13px;cursor:pointer;color:var(--ink);display:flex;align-items:center;gap:4px;white-space:nowrap;font-family:var(--font-ui);}
.tool-btn:active{background:var(--line);}
.tool-sep{flex-shrink:0;width:1px;height:24px;background:var(--line);margin:0 2px;}

.sticker-panel{flex-shrink:0;display:none;padding:8px 12px;background:var(--bar);border-bottom:1px solid var(--line);gap:6px;flex-wrap:wrap;}
.sticker-panel.open{display:flex;}
.sticker{font-size:24px;cursor:pointer;padding:4px 6px;border-radius:8px;}
.sticker:active{background:var(--line);}

.word-count{flex-shrink:0;font-size:10px;color:var(--muted);text-align:right;padding:3px 18px 1px;}

.editor-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px;}
.editor{min-height:100%;background:var(--paper);margin:12px 14px 0;border-radius:4px;box-shadow:2px 2px 10px var(--shadow);padding:16px 18px 24px 50px;position:relative;outline:none;font-family:var(--font-hand);font-size:21px;line-height:1.9;color:var(--ink);word-break:break-word;
  background-image:repeating-linear-gradient(transparent,transparent calc(1.9em - 1px),var(--line) calc(1.9em - 1px),var(--line) 1.9em);
  background-origin:content-box;}
.editor::before{content:'';position:absolute;left:36px;top:0;bottom:0;width:1.5px;background:rgba(201,124,58,0.22);}
.editor:empty::after{content:attr(data-placeholder);color:var(--muted);font-size:19px;font-family:var(--font-hand);pointer-events:none;}

.diary-img-block{display:block;margin:10px 0;position:relative;user-select:none;}
.diary-img-block img{display:block;border-radius:8px;max-width:100%;box-shadow:1px 2px 8px var(--shadow);}
.diary-img-block .img-tb{position:absolute;top:6px;right:6px;display:none;gap:4px;}
.diary-img-block.sel .img-tb{display:flex;}
.itb{width:30px;height:30px;border-radius:7px;background:rgba(0,0,0,0.6);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;}
.sz-btns,.al-btns{display:flex;gap:4px;margin-top:5px;}
.sz-btn{font-size:11px;padding:2px 8px;border:1px solid var(--line);border-radius:20px;background:var(--paper);cursor:pointer;color:var(--muted);font-family:var(--font-ui);}
.sz-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.diary-img-block.sz-s img{max-width:42%;}
.diary-img-block.sz-m img{max-width:74%;}
.diary-img-block.sz-l img{max-width:100%;}
.diary-img-block.al-l{text-align:left;}
.diary-img-block.al-c{text-align:center;}
.diary-img-block.al-r{text-align:right;}

.bottombar{flex-shrink:0;background:var(--bar);border-top:1.5px solid var(--line);display:flex;align-items:center;justify-content:space-around;padding:8px 8px calc(8px + var(--safe-bottom));gap:4px;}
.bb-btn{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--muted);cursor:pointer;background:none;border:none;padding:6px 8px;border-radius:10px;font-family:var(--font-ui);}
.bb-btn:active{background:var(--line);}
.bb-btn svg{width:22px;height:22px;}
.bb-save{background:var(--accent)!important;color:#fff!important;padding:10px 18px!important;border-radius:22px!important;font-size:13px!important;font-weight:500!important;flex-direction:row!important;gap:6px!important;}
.bb-save:active{background:#a8662e!important;}

.list-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:16px;}
.list-empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:15px;line-height:2.2;}
.entry-card{background:var(--paper);margin:10px 14px 0;border-radius:12px;border:1px solid var(--line);overflow:hidden;}
.ec-top{display:flex;justify-content:space-between;align-items:center;padding:12px 14px 4px;}
.ec-date{font-size:12px;color:var(--muted);}
.ec-edited{font-size:10px;color:var(--accent);margin-left:5px;}
.ec-meta{font-size:16px;}
.ec-preview{padding:2px 14px 8px;font-family:var(--font-hand);font-size:17px;color:var(--ink);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.ec-tags{display:flex;gap:4px;flex-wrap:wrap;padding:0 14px 6px;}
.ec-tag{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--bg);color:var(--muted);border:1px solid var(--line);}
.ec-actions{display:flex;gap:6px;padding:8px 14px 12px;border-top:1px solid var(--line);}
.ec-btn{flex:1;font-size:12px;padding:8px 0;border-radius:20px;cursor:pointer;font-family:var(--font-ui);border:1px solid var(--line);background:var(--bg);color:var(--muted);text-align:center;}
.ec-btn:active{opacity:0.7;}
.ec-btn.edit{border-color:var(--accent);color:var(--accent);font-weight:500;background:#fff8f2;}
.ec-btn.edit:active{background:var(--accent);color:#fff;}
.ec-btn.dl{border-color:var(--accent2);color:var(--accent2);}
.ec-btn.dl:active{background:var(--accent2);color:#fff;}
.ec-btn.del{border-color:#e8c0b0;color:#c06040;flex:0;padding:8px 14px;}
.ec-btn.del:active{background:#c06040;color:#fff;}

#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(44,36,22,0.9);color:#fff;font-size:13px;padding:10px 22px;border-radius:22px;opacity:0;transition:all 0.25s;pointer-events:none;z-index:999;white-space:nowrap;font-family:var(--font-ui);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- WRITE SCREEN -->
<div class="screen active" id="screen-write">
  <div class="topbar">
    <div class="logo" id="write-logo">✍ 내 일기</div>
    <div class="date-badge" id="today-date"></div>
    <button class="icon-btn" id="weather-btn" onclick="cycleWeather()">☀️</button>
  </div>

  <div id="install-banner">
    <p>📱 홈 화면에 추가하면 앱처럼 실행돼요!</p>
    <button class="inst-btn" id="inst-btn">설치하기</button>
    <button class="close-banner" onclick="document.getElementById('install-banner').classList.remove('show')">✕</button>
  </div>

  <div id="edit-banner">
    <span>✏️ 수정 중이에요 — 저장하면 기존 일기가 업데이트돼요.</span>
    <button class="cancel-edit-btn" onclick="cancelEdit()">취소</button>
  </div>

  <div class="mood-bar">
    <span class="mood-label">기분</span>
    <button class="mood-btn" data-mood="😊" onclick="setMood(this)">😊</button>
    <button class="mood-btn" data-mood="😌" onclick="setMood(this)">😌</button>
    <button class="mood-btn" data-mood="😢" onclick="setMood(this)">😢</button>
    <button class="mood-btn" data-mood="😤" onclick="setMood(this)">😤</button>
    <button class="mood-btn" data-mood="🥰" onclick="setMood(this)">🥰</button>
    <button class="mood-btn" data-mood="😴" onclick="setMood(this)">😴</button>
  </div>

  <div class="tag-bar">
    <span class="mood-label">태그</span>
    <span class="tag-chip" onclick="toggleTag(this)">#일상</span>
    <span class="tag-chip" onclick="toggleTag(this)">#여행</span>
    <span class="tag-chip" onclick="toggleTag(this)">#음식</span>
    <span class="tag-chip" onclick="toggleTag(this)">#공부</span>
    <span class="tag-chip" onclick="toggleTag(this)">#운동</span>
    <span class="tag-chip" onclick="toggleTag(this)">#감사</span>
  </div>

  <div class="toolbar">
    <button class="tool-btn" onclick="execCmd('bold')"><svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 4h5a3 3 0 010 6H6V4zm0 6h6a3 3 0 010 6H6v-6z"/></svg></button>
    <button class="tool-btn" onclick="execCmd('italic')"><svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M8 4h6M6 16h6M11 4l-3 12"/></svg></button>
    <button class="tool-btn" onclick="execHL()"><svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="7" width="12" height="6" rx="2"/><path d="M8 13v3M12 13v3"/></svg></button>
    <div class="tool-sep"></div>
    <button class="tool-btn" onclick="insertPhoto()"><svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="16" height="13" rx="2"/><circle cx="7.5" cy="9" r="1.5"/><path d="M2 14l4-4 3 3 3-4 6 5"/></svg> 사진</button>
    <button class="tool-btn" onclick="toggleSt()"><svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="10" r="7"/><path d="M7 10s.5 2 3 2 3-2 3-2M8 8h.01M12 8h.01"/></svg> 스티커</button>
    <div class="tool-sep"></div>
    <button class="tool-btn" onclick="execCmd('insertUnorderedList')"><svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5" cy="7" r="1.2" fill="currentColor" stroke="none"/><path d="M8 7h9"/><circle cx="5" cy="13" r="1.2" fill="currentColor" stroke="none"/><path d="M8 13h9"/></svg></button>
  </div>

  <div class="sticker-panel" id="sticker-panel">
    <span class="sticker" onclick="ins('⭐')">⭐</span><span class="sticker" onclick="ins('❤️')">❤️</span>
    <span class="sticker" onclick="ins('🌸')">🌸</span><span class="sticker" onclick="ins('🌿')">🌿</span>
    <span class="sticker" onclick="ins('🍀')">🍀</span><span class="sticker" onclick="ins('🦋')">🦋</span>
    <span class="sticker" onclick="ins('🌙')">🌙</span><span class="sticker" onclick="ins('✨')">✨</span>
    <span class="sticker" onclick="ins('🎵')">🎵</span><span class="sticker" onclick="ins('🌈')">🌈</span>
    <span class="sticker" onclick="ins('🎀')">🎀</span><span class="sticker" onclick="ins('☁️')">☁️</span>
  </div>

  <div class="word-count" id="wc">0 글자</div>
  <div class="editor-wrap">
    <div class="editor" id="editor" contenteditable="true"
      data-placeholder="오늘 하루를 기록해 보세요..."
      oninput="onInput()" onkeydown="onKD(event)"></div>
  </div>

  <div class="bottombar">
    <button class="bb-btn" onclick="goList()">
      <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="16" height="16" rx="3"/><path d="M7 8h8M7 12h6M7 16h4"/></svg>
      목록
    </button>
    <button class="bb-btn bb-save" onclick="saveEntry()">
      <svg width="17" height="17" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 3v10M6 9l4 4 4-4"/><path d="M3 17h14"/></svg>
      저장하기
    </button>
    <button class="bb-btn" onclick="newDiary()">
      <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M11 4v14M4 11h14"/></svg>
      새 일기
    </button>
  </div>
</div>

<!-- LIST SCREEN -->
<div class="screen" id="screen-list">
  <div class="topbar">
    <button class="icon-btn" onclick="goWrite()" style="margin-right:4px;">←</button>
    <div class="logo">📔 일기 목록</div>
    <div class="date-badge" id="entry-count">0개</div>
  </div>
  <div class="list-wrap" id="list-wrap">
    <div class="list-empty" id="list-empty">아직 저장된 일기가 없어요<br>✏️ 첫 일기를 써보세요!</div>
  </div>
</div>

<div id="toast"></div>
<input type="file" id="file-input" accept="image/*" multiple onchange="handleFiles(event)" style="display:none">

<script>
const weathers=['☀️','⛅','🌧️','❄️','🌫️','🌩️'];
let wIdx=0,mood='',insertAfter=null,entries=[],deferredPrompt=null,editingId=null;

(()=>{
  const d=new Date(),dy=['일','월','화','수','목','금','토'];
  document.getElementById('today-date').textContent=
    `${d.getFullYear()}.${p2(d.getMonth()+1)}.${p2(d.getDate())} (${dy[d.getDay()]})`;
})();
function p2(n){return String(n).padStart(2,'0');}

try{const s=localStorage.getItem('diary_entries');if(s)entries=JSON.parse(s);}catch(e){}

if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});

window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('install-banner').classList.add('show');
});
document.getElementById('inst-btn').onclick=async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  const{outcome}=await deferredPrompt.userChoice;
  deferredPrompt=null;
  document.getElementById('install-banner').classList.remove('show');
  if(outcome==='accepted')toast('홈 화면에 추가됐어요 🎉');
};
window.addEventListener('appinstalled',()=>toast('설치 완료! 홈 화면을 확인해보세요 📱'));

function cycleWeather(){wIdx=(wIdx+1)%weathers.length;document.getElementById('weather-btn').textContent=weathers[wIdx];}
function setMood(btn){document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');mood=btn.dataset.mood;}
function toggleTag(c){c.classList.toggle('active');}
function execCmd(cmd){document.getElementById('editor').focus();document.execCommand(cmd,false,null);}
function execHL(){document.getElementById('editor').focus();document.execCommand('hiliteColor',false,'rgba(201,124,58,0.22)');}
function onInput(){const t=document.getElementById('editor').innerText.replace(/\n/g,'').trim();document.getElementById('wc').textContent=t.length+' 글자';}
function onKD(e){if(e.key==='Enter'){document.execCommand('insertParagraph',false);e.preventDefault();}}
function toggleSt(){document.getElementById('sticker-panel').classList.toggle('open');}
function ins(e){document.getElementById('editor').focus();document.execCommand('insertText',false,e);}

function insertPhoto(){
  const ed=document.getElementById('editor'),sel=window.getSelection();
  if(sel&&sel.rangeCount>0){const range=sel.getRangeAt(0);let n=range.startContainer;
    while(n&&n!==ed){if(n.parentNode===ed){insertAfter=n;break;}n=n.parentNode;}}
  document.getElementById('file-input').click();
}
function handleFiles(e){
  Array.from(e.target.files).forEach(f=>{const r=new FileReader();r.onload=ev=>insertImg(ev.target.result);r.readAsDataURL(f);});
  e.target.value='';
}
function insertImg(src){
  const ed=document.getElementById('editor');
  const block=document.createElement('div');block.className='diary-img-block sz-m al-l';block.contentEditable='false';
  const img=document.createElement('img');img.src=src;img.alt='';img.onclick=()=>selBlock(block);
  const tb=document.createElement('div');tb.className='img-tb';
  const del=document.createElement('button');del.className='itb';
  del.innerHTML='<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="2.2"><path d="M3 3l10 10M13 3L3 13"/></svg>';
  del.onclick=ev=>{ev.stopPropagation();block.remove();onInput();};tb.appendChild(del);
  const szD=document.createElement('div');szD.className='sz-btns';
  [['sz-s','작게'],['sz-m','중간'],['sz-l','크게']].forEach(([cls,lbl])=>{
    const b=document.createElement('button');b.className='sz-btn'+(cls==='sz-m'?' active':'');b.textContent=lbl;
    b.onclick=ev=>{ev.stopPropagation();block.classList.remove('sz-s','sz-m','sz-l');block.classList.add(cls);szD.querySelectorAll('.sz-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');};szD.appendChild(b);});
  const alD=document.createElement('div');alD.className='al-btns';
  [['al-l','◀'],['al-c','■'],['al-r','▶']].forEach(([cls,lbl])=>{
    const b=document.createElement('button');b.className='sz-btn'+(cls==='al-l'?' active':'');b.textContent=lbl;
    b.onclick=ev=>{ev.stopPropagation();block.classList.remove('al-l','al-c','al-r');block.classList.add(cls);alD.querySelectorAll('.sz-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');};alD.appendChild(b);});
  block.appendChild(img);block.appendChild(tb);block.appendChild(szD);block.appendChild(alD);
  if(insertAfter&&insertAfter.parentNode===ed)ed.insertBefore(block,insertAfter.nextSibling);else ed.appendChild(block);
  const p=document.createElement('p');p.innerHTML='<br>';block.after(p);
  const range=document.createRange();range.setStart(p,0);range.collapse(true);
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
  toast('사진 삽입됐어요 📷');insertAfter=null;
}
function selBlock(b){document.querySelectorAll('.diary-img-block').forEach(x=>x.classList.remove('sel'));b.classList.toggle('sel');}

function buildHTML(dateStr,html,m,w,tags){
  return`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>일기 ${dateStr}</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
<style>body{font-family:'Nanum Pen Script',serif;font-size:22px;line-height:2;padding:28px 20px;max-width:640px;margin:auto;color:#2c2416;background:#fffef9;}
.meta{font-family:sans-serif;font-size:13px;color:#8a7a65;margin-bottom:24px;padding-bottom:12px;border-bottom:2px solid #e8e0d0;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.tag{background:#f0ebe0;padding:2px 9px;border-radius:20px;font-size:11px;}
img{max-width:100%;border-radius:10px;margin:12px 0;display:block;}
.diary-img-block{margin:12px 0;}.diary-img-block.sz-s img{max-width:42%;}.diary-img-block.sz-m img{max-width:74%;}.diary-img-block.sz-l img{max-width:100%;}
.diary-img-block.al-c{text-align:center;}.diary-img-block.al-r{text-align:right;}
.img-tb,.sz-btns,.al-btns{display:none!important;}</style></head><body>
<div class="meta"><span>📅 ${dateStr}</span><span>${m}</span><span>${w}</span>${tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
${html}</body></html>`;
}

function saveEntry(){
  const ed=document.getElementById('editor');
  const html=ed.innerHTML.trim(),text=ed.innerText.trim();
  if(!text&&!html.includes('<img')){toast('내용을 먼저 입력해 주세요 ✏️');return;}
  const d=new Date();
  const tags=Array.from(document.querySelectorAll('.tag-chip.active')).map(t=>t.textContent);

  if(editingId!==null){
    const idx=entries.findIndex(e=>e.id===editingId);
    if(idx>-1){
      const old=entries[idx];
      const m=mood||old.mood, w=weathers[wIdx], t=tags.length?tags:old.tags;
      const full=buildHTML(old.date,html,m,w,t);
      entries[idx]={...old,mood:m,weather:w,tags:t,preview:text.slice(0,60),html:full,
        editedAt:`${p2(d.getHours())}:${p2(d.getMinutes())}`};
      saveLS();
      dlBlob(full,old.fn);
      toast('✅ 수정 저장 완료!');
    }
    cancelEdit();
  } else {
    const ds=`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
    const fn=`일기_${ds}_${p2(d.getHours())}${p2(d.getMinutes())}.html`;
    const full=buildHTML(ds,html,mood||'—',weathers[wIdx],tags);
    entries.unshift({id:Date.now(),date:ds,time:`${d.getHours()}:${p2(d.getMinutes())}`,mood:mood||'—',weather:weathers[wIdx],tags,preview:text.slice(0,60),fn,html:full});
    saveLS();
    dlBlob(full,fn);
    toast(`💾 ${fn} 저장 완료!`);
  }
}

function dlBlob(html,fn){
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
function saveLS(){try{localStorage.setItem('diary_entries',JSON.stringify(entries.slice(0,200)));}catch(e){}}

/* ── load entry into editor for editing ── */
function loadEntry(id){
  const e=entries.find(x=>x.id===id);if(!e)return;
  if(document.getElementById('editor').innerText.trim()&&editingId===null)
    if(!confirm('작성 중인 내용이 있어요. 불러오면 사라져요. 계속할까요?'))return;

  // extract body content from saved HTML (strip the .meta div)
  const parser=new DOMParser();
  const doc=parser.parseFromString(e.html,'text/html');
  const metaEl=doc.querySelector('.meta');if(metaEl)metaEl.remove();
  const bodyContent=doc.body.innerHTML.trim();

  document.getElementById('editor').innerHTML=bodyContent;
  onInput();

  // restore mood
  mood=e.mood;
  document.querySelectorAll('.mood-btn').forEach(b=>b.classList.toggle('active',b.dataset.mood===e.mood));

  // restore weather
  const wi=weathers.indexOf(e.weather);
  if(wi>-1){wIdx=wi;document.getElementById('weather-btn').textContent=weathers[wIdx];}

  // restore tags
  document.querySelectorAll('.tag-chip').forEach(chip=>chip.classList.toggle('active',e.tags.includes(chip.textContent)));

  editingId=e.id;
  document.getElementById('edit-banner').classList.add('show');
  document.getElementById('write-logo').textContent='✏️ 수정 중';
  goWrite();
  toast('불러왔어요! 수정 후 저장하세요 ✏️');
}

function cancelEdit(){
  editingId=null;
  document.getElementById('edit-banner').classList.remove('show');
  document.getElementById('write-logo').textContent='✍ 내 일기';
  document.getElementById('editor').innerHTML='';
  document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tag-chip').forEach(t=>t.classList.remove('active'));
  mood='';wIdx=0;
  document.getElementById('weather-btn').textContent=weathers[0];
  document.getElementById('wc').textContent='0 글자';
}

function goList(){renderList();document.getElementById('screen-write').classList.remove('active');document.getElementById('screen-list').classList.add('active');}
function goWrite(){document.getElementById('screen-list').classList.remove('active');document.getElementById('screen-write').classList.add('active');}

function renderList(){
  document.getElementById('entry-count').textContent=entries.length+'개';
  const wrap=document.getElementById('list-wrap');
  document.getElementById('list-empty').style.display=entries.length?'none':'block';
  wrap.querySelectorAll('.entry-card').forEach(c=>c.remove());
  entries.forEach(e=>{
    const card=document.createElement('div');card.className='entry-card';
    card.innerHTML=`
      <div class="ec-top">
        <span class="ec-date">${e.date} ${e.time}${e.editedAt?`<span class="ec-edited">수정 ${e.editedAt}</span>`:''}</span>
        <span class="ec-meta">${e.mood} ${e.weather}</span>
      </div>
      <div class="ec-preview">${e.preview||'(사진만 있음)'}...</div>
      ${e.tags.length?`<div class="ec-tags">${e.tags.map(t=>`<span class="ec-tag">${t}</span>`).join('')}</div>`:''}
      <div class="ec-actions">
        <button class="ec-btn edit" onclick="loadEntry(${e.id})">✏️ 불러와서 수정</button>
        <button class="ec-btn dl" onclick="reDL(${e.id})">↓ 다운로드</button>
        <button class="ec-btn del" onclick="delEntry(${e.id})">🗑</button>
      </div>`;
    wrap.appendChild(card);
  });
}

function reDL(id){const e=entries.find(x=>x.id===id);if(!e)return;dlBlob(e.html,e.fn);toast('다운로드했어요 📥');}
function delEntry(id){
  if(!confirm('이 일기를 삭제할까요?'))return;
  entries=entries.filter(e=>e.id!==id);saveLS();renderList();toast('삭제했어요 🗑');
}

function newDiary(){
  if(document.getElementById('editor').innerText.trim()&&!confirm('새 일기를 시작할까요?'))return;
  cancelEdit();
}

function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800);
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.diary-img-block'))document.querySelectorAll('.diary-img-block').forEach(b=>b.classList.remove('sel'));
});
</script>
</body>
</html>
